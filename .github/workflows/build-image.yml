name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Github Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU Action
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Login GCHR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Versioning By Date "yyyy-mm-dd-hh-mm-ss"
        id: getversion
        run: |
          VERSION_IMAGE=$(date +"%Y-%m-%d-%H-%M-%S")
          echo "Version Now: $VERSION_IMAGE"
          echo "VERSION_IMAGE=$VERSION_IMAGE" >> $GITHUB_ENV
          echo "VERSION_IMAGE=$VERSION_IMAGE" >> $GITHUB_OUTPUT

      - name: Build Image MCP Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TARGET=production
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.execute-init.outputs.VERSION_IMAGE }}
            ghcr.io/${{ github.repository }}:latest
          provenance: false